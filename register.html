<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI for Students — Register</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>var supabaseCreateClient = supabase.createClient;</script>
</head>
<body class="auth-page">

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🤖 AI for Students</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="auth-sub">Join the AI for Students community.</p>

    <div class="auth-error"></div>
    <div class="auth-success"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your name" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Re-enter password" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" class="auth-btn">Create Account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="login.html">Sign In</a>
    </p>
  </div>

  <script src="auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("register-form");
      const errorEl = document.querySelector(".auth-error");
      const successEl = document.querySelector(".auth-success");
      if (!form) return;

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.style.display = "none";
        successEl.style.display = "none";

        const name = document.getElementById("reg-name").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const password = document.getElementById("reg-password").value;
        const confirm = document.getElementById("reg-confirm").value;

        if (password !== confirm) {
          errorEl.textContent = "Passwords do not match.";
          errorEl.style.display = "block";
          return;
        }
        if (password.length < 8) {
          errorEl.textContent = "Password must be at least 8 characters.";
          errorEl.style.display = "block";
          return;
        }

        const btn = form.querySelector("button");
        btn.textContent = "Creating…";
        btn.disabled = true;

        try {
          const { user } = await signUp(email, password, name);
          if (user) {
            if (user.identities && user.identities.length === 0) {
              successEl.textContent = "Please check your email to confirm your account.";
            } else {
              successEl.textContent = "Account created! Redirecting…";
              setTimeout(() => { window.location.href = "index.html"; }, 1500);
            }
            successEl.style.display = "block";
            form.reset();
          }
        } catch (err) {
          errorEl.textContent = err.message || "Registration failed. Please try again.";
          errorEl.style.display = "block";
        } finally {
          btn.textContent = "Create Account";
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>

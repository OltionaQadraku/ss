<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI for Students — Login</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>var supabaseCreateClient = supabase.createClient;</script>
</head>
<body class="auth-page">

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🤖 AI for Students</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="auth-sub">Sign in to your account.</p>

    <div class="auth-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="auth-btn">Sign In</button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="register.html">Sign Up</a>
    </p>
  </div>

  <script src="auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("login-form");
      const errorEl = document.querySelector(".auth-error");
      if (!form) return;

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.style.display = "none";
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const btn = form.querySelector("button");
        btn.textContent = "Signing in…";
        btn.disabled = true;

        try {
          await signIn(email, password);
          window.location.href = "index.html";
        } catch (err) {
          errorEl.textContent = err.message || "Login failed. Please try again.";
          errorEl.style.display = "block";
          btn.textContent = "Sign In";
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
